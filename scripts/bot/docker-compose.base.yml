services:
  discord-proxy:
    image: discordjs/proxy:latest
    restart: unless-stopped
    networks:
      - ap-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  crosspost-worker:
    build:
      context: ../..
      dockerfile: apps/crosspost-worker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env.local
    networks:
      - ap-network
    depends_on:
      discord-proxy:
        condition: service_healthy
      backend :
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  bot:
    build:
      context: ../..
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env.local
    networks:
      - ap-network
    depends_on:
      discord-proxy:
        condition: service_healthy
      backend :
        condition: service_healthy
      crosspost-worker:
        condition: service_healthy
      redis:
        condition: service_healthy
        
  backend :
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env.local
    networks:
      - ap-network
    depends_on:
      discord-proxy:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - 6379:6379  # Only expose to localhost
    volumes:
      - redis_data:/data
    command: >
      redis-server 
      --port 6379
      --appendonly yes 
      --appendfsync everysec 
    networks:
      - ap-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  ap-network:
    driver: bridge
    internal: false  # Allow external access for Discord API

volumes:
  redis_data:
    driver: local