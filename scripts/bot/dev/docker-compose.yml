name: auto-publisher-dev

services:
  discord-proxy:
    extends:
      file: docker-compose.base.yml
      service: discord-proxy
    ports:
      - 8081:8080 # Expose proxy for local debugging
    healthcheck:
      disable: true # Remove healthcheck for faster development startup

  crosspost-worker:
    extends:
      file: docker-compose.base.yml
      service: crosspost-worker
    build:
      dockerfile: apps/crosspost-worker/Dockerfile.dev
    env_file:
      - ../../.env.local
    environment:
      - NODE_ENV=development
      - LOGGER_LEVEL=debug
    depends_on:
      discord-proxy:
        condition: service_started
      backend :
        condition: service_started
      redis:
        condition: service_started
    ports:
      - 8082:8082 # Expose worker for local debugging
    healthcheck:
      disable: true # Remove healthcheck for faster development startup
    command: ["bun", "run", "start"]
    develop:
      watch:
        - action: sync+restart
          path: ../../apps/crosspost-worker/src
          target: /app/apps/crosspost-worker/src
          ignore:
            - "**/*.test.ts"
            - "**/*.spec.ts"
        - action: sync+restart
          path: ../../packages
          target: /app/packages
          ignore:
            - "**/node_modules/"
            - "**/dist/"
            - "**/*.test.ts"
            - "**/*.spec.ts"
        - action: rebuild
          path: ../../apps/crosspost-worker/package.json
        - action: rebuild
          path: ../../package.json
        - action: rebuild
          path: ../../bun.lock

  bot:
    extends:
      file: docker-compose.base.yml
      service: bot
    build:
      dockerfile: apps/bot/Dockerfile.dev
    env_file:
      - ../../.env.local
    environment:
      - NODE_ENV=development
      - LOGGER_LEVEL=debug
    depends_on:
      discord-proxy:
        condition: service_started
      backend :
        condition: service_started
      crosspost-worker:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      disable: true # Remove healthcheck for faster development startup
    command: ["bun", "run", "start"]
    develop:
      watch:
        - action: sync+restart
          path: ../../apps/bot/src
          target: /app/apps/bot/src
          ignore:
            - "**/*.test.ts"
            - "**/*.spec.ts"
        - action: sync+restart
          path: ../../packages
          target: /app/packages
          ignore:
            - "**/node_modules/"
            - "**/dist/"
            - "**/*.test.ts"
            - "**/*.spec.ts"
        - action: rebuild
          path: ../../apps/bot/package.json
        - action: rebuild
          path: ../../package.json
        - action: rebuild
          path: ../../bun.lock

  backend :
    extends:
      file: docker-compose.base.yml
      service: backend 
    build:
      dockerfile: apps/backend/Dockerfile.dev
    env_file:
      - ../../.env.local
    environment:
      - NODE_ENV=development
      - LOGGER_LEVEL=debug
    depends_on:
      discord-proxy:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - 3000:8080 # Expose API for local development
    healthcheck: 
      disable: true # Remove healthcheck for faster development startup
    command: ["bun", "run", "start"]
    develop:
      watch:
        - action: sync+restart
          path: ../../apps/backend/src
          target: /app/apps/backend/src
          ignore:
            - "**/*.test.ts"
            - "**/*.spec.ts"
        - action: sync+restart
          path: ../../packages
          target: /app/packages
          ignore:
            - "**/node_modules/"
            - "**/dist/"
            - "**/*.test.ts"
            - "**/*.spec.ts"
        - action: rebuild
          path: ../../apps/backend/package.json
        - action: rebuild
          path: ../../package.json
        - action: rebuild
          path: ../../bun.lock

  redis:
    extends:
      file: docker-compose.base.yml
      service: redis
    ports:
      - 6379:6379 # Expose Redis for local development
