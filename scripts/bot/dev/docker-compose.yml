name: auto-publisher-dev

services:
  bot-core:
    extends:
      file: docker-compose.base.yml
      service: bot-core
    build:
      dockerfile: apps/bot-core/Dockerfile.dev
    env_file:
      - ../../.env.local
    environment:
      - NODE_ENV=development
      - LOGGER_LEVEL=debug
    depends_on:
      bot-api:
        condition: service_started
      bot-api-cache:
        condition: service_started
    healthcheck: 
      disable: true # Remove healthcheck for faster development startup
    command: ["bun", "run", "start"]
    develop:
      watch:
        - action: sync+restart
          path: ../../apps/bot-core/src
          target: /app/apps/bot-core/src
          ignore:
            - "**/*.test.ts"
            - "**/*.spec.ts"
        - action: sync+restart
          path: ../../packages
          target: /app/packages
          ignore:
            - "**/node_modules/"
            - "**/dist/"
            - "**/*.test.ts"
            - "**/*.spec.ts"
        - action: rebuild
          path: ../../apps/bot-core/package.json
        - action: rebuild
          path: ../../package.json
        - action: rebuild
          path: ../../bun.lock

  bot-api:
    extends:
      file: docker-compose.base.yml
      service: bot-api
    build:
      dockerfile: apps/bot-api/Dockerfile.dev
    env_file:
      - ../../.env.local
    environment:
      - NODE_ENV=development
      - LOGGER_LEVEL=debug
    depends_on:
      bot-api-cache:
        condition: service_started
    ports:
      - 3000:8080 # Expose API for local development
    healthcheck: 
      disable: true # Remove healthcheck for faster development startup
    command: ["bun", "run", "start"]
    develop:
      watch:
        - action: sync+restart
          path: ../../apps/bot-api/src
          target: /app/apps/bot-api/src
          ignore:
            - "**/*.test.ts"
            - "**/*.spec.ts"
        - action: sync+restart
          path: ../../packages
          target: /app/packages
          ignore:
            - "**/node_modules/"
            - "**/dist/"
            - "**/*.test.ts"
            - "**/*.spec.ts"
        - action: rebuild
          path: ../../apps/bot-api/package.json
        - action: rebuild
          path: ../../package.json
        - action: rebuild
          path: ../../bun.lock

  bot-api-cache:
    extends:
      file: docker-compose.base.yml
      service: bot-api-cache
    ports:
      - 6379:6379 # Expose Redis for local development
