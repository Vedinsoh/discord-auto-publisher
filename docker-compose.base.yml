services:
  discord-proxy:
    image: discordjs/proxy:latest
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api').catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  bot:
    build:
      context: services/bot
      dockerfile: .docker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      rest:
        condition: service_started
      discord-proxy:
        condition: service_healthy

  rest:
    build:
      context: services/rest
      dockerfile: .docker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      rest-cache:
        condition: service_started
      discord-proxy:
        condition: service_healthy

  rest-cache:
    image: redis:7-alpine
    restart: unless-stopped
    command: 'redis-server --port 6379'
    volumes:
      - rest-cache-data:/data

  rest-db:
    image: mongo:6
    restart: unless-stopped
    command: mongod --port 27017
    volumes:
      - rest-db-data:/data/db

volumes:
  rest-cache-data:
  rest-db-data:
